services:
  - type: web
    name: rag-pipeline-studio-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./rag_pipeline.db
      - key: FRONTEND_URL
        sync: false
